version: "3.9"

services:
   postgres:
     image: postgres:18
     container_name: freight-postgres
     restart: always
     environment:
       POSTGRES_DB: freightdb
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: postgres
     ports:
       - "5432:5432"
     volumes:
       - postgres_data:/var/lib/postgresql

     healthcheck:
       test: ["CMD-SHELL","pg_isready -U postgres"]
       interval: 5s
       timeout: 5s
       retries: 5

   app:
     image: freight-app:v1.0
     container_name: freight-app
     depends_on:
        postgres:
          condition: service_healthy
     ports:
       - "8081:8080"
     environment:
       SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freightdb
       SPRING_DATASOURCE_USERNAME: postgres
       SPRING_DATASOURCE_PASSWORD: postgres

volumes:
   postgres_data:
